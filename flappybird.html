<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird OG Clone</title>
<style>
    body { margin: 0; background: #70c5ce; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #70c5ce; display: block; }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Game variables
let bird = { x: 50, y: 300, radius: 15, velocity: 0 };
const gravity = 0.5;
const jump = -10;
let pipes = [];
const pipeWidth = 70;
const pipeGap = 150;
const pipeSpeed = 3;
let score = 0;
let gameOver = false;

// Create a new pipe
function createPipe() {
    const topHeight = Math.floor(Math.random() * (canvas.height - pipeGap - 50)) + 50;
    const top = { x: canvas.width, y: 0, width: pipeWidth, height: topHeight };
    const bottom = { x: canvas.width, y: topHeight + pipeGap, width: pipeWidth, height: canvas.height - topHeight - pipeGap };
    pipes.push({ top, bottom });
}

// Draw everything
function draw() {
    // Background
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Bird
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
    ctx.fill();

    // Pipes
    ctx.fillStyle = "#0f0";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.top.x, pipe.top.y, pipe.top.width, pipe.top.height);
        ctx.fillRect(pipe.bottom.x, pipe.bottom.y, pipe.bottom.width, pipe.bottom.height);
    });

    // Score
    ctx.fillStyle = "#fff";
    ctx.font = "30px Arial";
    ctx.fillText(score, 10, 40);
}

// Update game logic
function update() {
    if (gameOver) return;

    // Bird physics
    bird.velocity += gravity;
    bird.y += bird.velocity;

    // Move pipes
    pipes.forEach(pipe => {
        pipe.top.x -= pipeSpeed;
        pipe.bottom.x -= pipeSpeed;
    });

    // Add new pipe
    if (pipes.length === 0 || pipes[pipes.length - 1].top.x < canvas.width - 200) {
        createPipe();
    }

    // Remove off-screen pipes and update score
    if (pipes[0].top.x + pipeWidth < 0) {
        pipes.shift();
        score++;
    }

    // Collision detection
    const birdRect = { x: bird.x - bird.radius, y: bird.y - bird.radius, width: bird.radius*2, height: bird.radius*2 };
    for (let pipe of pipes) {
        const top = pipe.top, bottom = pipe.bottom;
        if (birdRect.x < top.x + top.width && birdRect.x + birdRect.width > top.x &&
            birdRect.y < top.y + top.height && birdRect.y + birdRect.height > top.y) gameOver = true;
        if (birdRect.x < bottom.x + bottom.width && birdRect.x + birdRect.width > bottom.x &&
            birdRect.y < bottom.y + bottom.height && birdRect.y + birdRect.height > bottom.y) gameOver = true;
    }
    if (bird.y - bird.radius <= 0 || bird.y + bird.radius >= canvas.height) gameOver = true;
}

// Main loop
function loop() {
    update();
    draw();
    if (!gameOver) requestAnimationFrame(loop);
    else {
        ctx.fillStyle = "#f00";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 80, canvas.height / 2);
    }
}

// Jump on click/space
document.addEventListener("keydown", e => {
    if (e.code === "Space") bird.velocity = jump;
});
document.addEventListener("mousedown", () => bird.velocity = jump);

// Start the game
createPipe();
loop();
</script>
</body>
</html>

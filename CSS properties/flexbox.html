<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Display Property Tutorial</title>

    <!-- Internal CSS -->
    <style>
        /* Block element example */
        .block-example {
            display: block;   /* Takes full width */
            background-color: lightblue;
            margin: 10px;
        }

        /* Inline element example */
        .inline-example {
            display:inline;  /* Takes only needed width */
            background-color: lightgreen;
            margin: 10px;
        }

        /* Inline-block example */
        .inline-block-example {
            display: inline-block; /* Inline but allows width/height */
            width: 150px;
            height: 50px;
            background-color: orange;
            margin: 10px;
        }
    </style>
</head>

<body>

    <h2>Display Property Examples</h2>

    <!-- Block elements -->
    <div class="block-example">Block Element 1</div>
    <div class="block-example">Block Element 2</div>
    <div class="block-example example">Block Element 3</div>

    <hr> 

    <!-- Inline elements -->
    <span class="inline-example">Inline 1</span>
    <span class="inline-example">Inline 2</span>
    <span class="inline-example">Inline 3</span>

    <hr>

    <!-- Inline-block elements -->
    <div class="inline-block-example">Inline Block 1</div>
    <div class="inline-block-example">Inline Block 2</div>

</body>
</html>
    
</body>
</html>

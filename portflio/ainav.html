<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial;
}

nav {
  background: #222;
  padding: 15px;
}

.nav-links {
  display: flex;
  gap: 20px;
}

.nav-links a {
  color: white;
  text-decoration: none;
}

/* Burger button */
.menu-btn {
  display: none;
  font-size: 24px;
  color: white;
  cursor: pointer;
}

/* Mobile */
@media (max-width: 1000px) {

  .menu-btn {
    display: block;
  }

  .nav-links {
    display: none;
    flex-direction: column;
    margin-top: 10px;
  }

  .nav-links.show {
    display: flex;
  }
}
</style>
</head>

<body>

<nav>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="menu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </div>
</nav>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>

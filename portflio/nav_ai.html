<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Navbar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    padding: 15px 30px;
    z-index: 1000;
}

.logo {
    color: white;
    font-size: 22px;
    font-weight: bold;
}

.menu {
    display: flex;
    gap: 25px;
}

.menu a {
    color: white;
    text-decoration: none;
    position: relative;
}

/* COOL UNDERLINE ANIMATION */
.menu a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #00d4ff;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.menu a:hover::after {
    width: 100%;
}

/* HAMBURGER */
.hamburger {
    display: none;
    font-size: 26px;
    color: white;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 700px) {
    .menu {
        position: absolute;
        top: 60px;
        right: 0;
        background: #111;
        flex-direction: column;
        width: 100%;
        display: none;
        text-align: center;
    }

    .menu.active {
        display: flex;
    }

    .hamburger {
        display: block;
    }
}

/* DEMO CONTENT */
.content {
    height: 2000px;
    padding: 20px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">MySite</div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu" id="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </div>
</div>

<div class="content">
    Scroll to test sticky + responsive navbar.
</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}
</script><s

</body>
</html>

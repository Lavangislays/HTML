<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavangi | Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    scroll-behavior: smooth;
}

/* NAVBAR */
.navbar {
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.5) !important;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    text-align: center;
}

.pfp {
    width: 130px;
    border-radius: 50%;
    border: 3px solid #00f7ff;
    box-shadow: 0 0 25px #00f7ff;
}

/* GLOW TEXT */
.glow {
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.05);
    border: none;
    backdrop-filter: blur(10px);
    color: white;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 20px #00f7ff;
}

/* SECTIONS */
section {
    padding: 80px 0;
}

/* FOOTER */
footer {
    background: rgba(0,0,0,0.7);
}

/* TYPING CURSOR */
#cursor {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">
    <a class="navbar-brand fw-bold glow" href="#">Lavangi</a>
</div>
</nav>

<!-- HERO -->
<header class="hero" id="hero">
<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Lara_Raj_240913_1.jpg/250px-Lara_Raj_240913_1.jpg" class="pfp mb-4">

    <h1 class="display-5 fw-bold">
        Hi, I'm <span id="typing" class="glow"></span><span id="cursor">|</span>
    </h1>

    <p class="lead mt-3">I build cool stuff and love learning 🚀</p>
</div>
</header>

<!-- ABOUT -->
<section id="about">
<div class="container text-center">
    <h2 class="glow mb-4">About Me</h2>
    <p class="lead">Student • Creator • Future Developer</p>
</div>
</section>

<!-- SKILLS -->
<section id="skills">
<div class="container">
    <h2 class="glow text-center mb-5">Skills</h2>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 text-center">
                <h4>💻 Coding</h4>
                <p>Websites, games, and fun projects</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 text-center">
                <h4>🎨 Design</h4>
                <p>Creative ideas and cool visuals</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 text-center">
                <h4>🤝 Teamwork</h4>
                <p>Working together to build awesome things</p>
            </div>
        </div>
    </div>
</div>
</section>

<!-- FOOTER -->
<footer class="text-center py-3">
<p>Made with ⚡ and creativity</p>
</footer>

<script>
const text = "Lavangi";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 120);
    }
}

typeEffect();
</script>

</body>
</html>

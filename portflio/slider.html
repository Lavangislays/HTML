<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .slider {
            overflow: hidden;
            width: 300px;
            height: 300px;
            justify-content: center;
            align-items: center;
        }
        .slides {
            display:flex;
            width: 300%;
            justify-content: center;
            align-items: center;
            height: 400px;
             }
        button {
            background-color: rgb(201, 112, 197);
            border: none;
            padding: 12px 14px;
            box-shadow:  4px 6px rgba(0, 0, 0, 0.1); 
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            
         
        }

        
        
    </style>
</head>
<body>
    <div class="slider">       
        <div class="slides" id="Heart2Hearts">
            <img src="https://i.scdn.co/image/ab67616d0000b273bd0db295c0164ddbc0584ebb" width="300px">
            <img src="https://d28hgpri8am2if.cloudfront.net/book_images/onix/cvr9781647221263/stranger-things-the-ultimate-pop-up-book-9781647221263_hr.jpg" width="300px">
            <img src="https://static0.cbrimages.com/wordpress/wp-content/uploads/2024/09/stranger-things-every-seasons.jpg?w=1200&h=900&fit=crop" width="300px">
        </div>
    </div>

    <div class="print">
        <button onclick="prevSlide()">Prev</button>
        <button onclick="nextSlide()">Next</button>

    </div>

    <script>
        let index = 0;

        const slides = document.getElementById("Heart2Hearts");

        const totalSlides = 3;

        function prevSlide(){
            index = (index - 1 +  totalSlides)%totalSlides;
            slides.style.transform = `translateX(-${index * 300}px)`;
        }
        function nextSlide(){
            index = (index + 1 )%totalSlides;
             slides.style.transform = `translateX(-${index * 300}px)`;
            
        }
    </script>
    
</body>
</html>
